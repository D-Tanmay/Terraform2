name: Terraform CI/CD

# ─────────────────────────────────────────────────────────────────────────────
# HOW TO USE
# ─────────────────────────────────────────────────────────────────────────────
#
#  Secrets required in GitHub → Settings → Secrets → Actions:
#    AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID,
#    AZURE_SUBSCRIPTION_ID, AZURE_VM_PASSWORD
#
#  Flow:  plan job → (approval gate) → apply job
#
#  action = plan    → only plan job runs
#  action = apply   → plan job runs, waits for approval, then apply job runs
#  action = destroy → plan job runs (destroy plan), approval, then destroy
#
#  Approval gate: Repo → Settings → Environments → apply / destroy
#                 → Add Required reviewers
#
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      tf_file:
        description: "Terraform file to target (e.g. vm.tf, network.tf)"
        required: true
        type: string
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: write

concurrency:
  group: terraform-${{ github.event.inputs.tf_file }}
  cancel-in-progress: false

env:
  TF_FILE:               ${{ github.event.inputs.tf_file }}
  ACTION:                ${{ github.event.inputs.action }}
  WS_DIR:                /home/runner/isolated-tf
  BACKEND_RG:            tfstate-day04
  BACKEND_SA:            day0417691
  BACKEND_CONTAINER:     tfstate
  ARM_CLIENT_ID:         ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET:     ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_TENANT_ID:         ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID:   ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_admin_password: ${{ secrets.AZURE_VM_PASSWORD }}

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Plan
  # ───────────────────────────────────────────────────────────────────────────
  plan:
    name: "Plan → ${{ github.event.inputs.tf_file }}"
    runs-on: ubuntu-latest

    outputs:
      artifact-name: ${{ steps.artifact-name.outputs.value }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Debug: show repo structure so we can confirm file paths ─────────
      - name: Show repository structure
        shell: bash
        run: |
          echo "Working directory: $(pwd)"
          echo ""
          echo "Repository root contents:"
          ls -la
          echo ""
          echo "Terraform/ directory contents:"
          if [[ -d "Terraform" ]]; then
            ls -la Terraform/
          else
            echo "WARNING: No 'Terraform/' directory found at repo root!"
            echo "Searching for .tf files anywhere in the repo..."
            find . -name "*.tf" | sort
          fi

      - name: Validate secrets
        shell: bash
        run: |
          missing=()
          [[ -z "$ARM_CLIENT_ID"         ]] && missing+=("AZURE_CLIENT_ID")
          [[ -z "$ARM_CLIENT_SECRET"     ]] && missing+=("AZURE_CLIENT_SECRET")
          [[ -z "$ARM_TENANT_ID"         ]] && missing+=("AZURE_TENANT_ID")
          [[ -z "$ARM_SUBSCRIPTION_ID"   ]] && missing+=("AZURE_SUBSCRIPTION_ID")
          [[ -z "$TF_VAR_admin_password" ]] && missing+=("AZURE_VM_PASSWORD")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Missing secrets:"
            for s in "${missing[@]}"; do echo "  - $s"; done
            exit 1
          fi
          echo "OK: All secrets present."

      - name: Validate selected file
        shell: bash
        run: |
          if [[ "$TF_FILE" != *.tf ]]; then
            echo "ERROR: '$TF_FILE' does not end in .tf"
            exit 1
          fi
          if [[ "$TF_FILE" == */* ]] || [[ "$TF_FILE" == *..* ]]; then
            echo "ERROR: Filename must not contain slashes or '..'"
            exit 1
          fi
          if [[ ! -f "Terraform/$TF_FILE" ]]; then
            echo "ERROR: 'Terraform/$TF_FILE' not found."
            echo "Available .tf files:"
            find Terraform/ -maxdepth 1 -name "*.tf" | sort | sed 's|Terraform/||'
            exit 1
          fi
          echo "OK: 'Terraform/$TF_FILE' found."

      - name: Ensure Terraform/.gitignore excludes provider cache
        shell: bash
        run: |
          GITIGNORE="Terraform/.gitignore"
          touch "$GITIGNORE"
          entries=(
            ".terraform/" ".terraform.lock.hcl" "*.tfplan"
            "*.tfstate" "*.tfstate.backup" "crash.log"
            "override.tf" "override.tf.json"
          )
          for entry in "${entries[@]}"; do
            grep -qxF "$entry" "$GITIGNORE" || echo "$entry" >> "$GITIGNORE"
          done

      - name: Build isolated workspace
        shell: bash
        run: |
          mkdir -p "$WS_DIR"

          echo "Copying: Terraform/$TF_FILE → $WS_DIR/"
          cp "Terraform/$TF_FILE" "$WS_DIR/"

          for shared in provider.tf versions.tf variables.tf; do
            if [[ -f "Terraform/$shared" ]] && [[ "$shared" != "$TF_FILE" ]]; then
              echo "Copying shared: $shared"
              cp "Terraform/$shared" "$WS_DIR/"
            fi
          done

          for tfvars in Terraform/*.tfvars Terraform/*.tfvars.json; do
            if [[ -f "$tfvars" ]]; then
              echo "Copying tfvars: $(basename $tfvars)"
              cp "$tfvars" "$WS_DIR/"
            fi
          done

          echo ""
          echo "Workspace contents:"
          ls -lh "$WS_DIR/"

      - name: Install Azure CLI
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.9.7"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Bootstrap Terraform backend
        shell: bash
        run: |
          az group create --name "$BACKEND_RG" --location westeurope
          az storage account create \
            --resource-group "$BACKEND_RG" --name "$BACKEND_SA" \
            --sku Standard_LRS --kind StorageV2 --location westeurope
          ACCOUNT_KEY=$(az storage account keys list \
            --resource-group "$BACKEND_RG" --account-name "$BACKEND_SA" \
            --query '[0].value' --output tsv)
          az storage container create \
            --name "$BACKEND_CONTAINER" \
            --account-name "$BACKEND_SA" --account-key "$ACCOUNT_KEY"

      - name: Terraform init
        working-directory: ${{ env.WS_DIR }}
        shell: bash
        run: |
          STATE_KEY="${TF_FILE%.tf}.tfstate"
          echo "State key: $STATE_KEY"
          terraform init -reconfigure \
            -backend-config="resource_group_name=$BACKEND_RG" \
            -backend-config="storage_account_name=$BACKEND_SA" \
            -backend-config="container_name=$BACKEND_CONTAINER" \
            -backend-config="key=$STATE_KEY"

      - name: Force-unlock stale state lock
        shell: bash
        run: |
          STATE_KEY="${TF_FILE%.tf}.tfstate"
          ACCOUNT_KEY=$(az storage account keys list \
            --resource-group "$BACKEND_RG" --account-name "$BACKEND_SA" \
            --query '[0].value' --output tsv)
          LEASE_STATUS=$(az storage blob show \
            --container-name "$BACKEND_CONTAINER" --name "$STATE_KEY" \
            --account-name "$BACKEND_SA" --account-key "$ACCOUNT_KEY" \
            --query "properties.lease.status" --output tsv 2>/dev/null || echo "notfound")
          echo "Lease status: $LEASE_STATUS"
          if [[ "$LEASE_STATUS" == "locked" ]]; then
            az storage blob lease break \
              --container-name "$BACKEND_CONTAINER" --blob-name "$STATE_KEY" \
              --account-name "$BACKEND_SA" --account-key "$ACCOUNT_KEY"
            echo "OK: Stale lease broken."
          else
            echo "OK: No stale lock."
          fi

      - name: Terraform format (auto-fix)
        working-directory: ${{ env.WS_DIR }}
        shell: bash
        run: |
          terraform fmt -recursive
          cd "$GITHUB_WORKSPACE"
          git add -- "Terraform/$TF_FILE"
          if git diff --cached --quiet; then
            echo "OK: No formatting changes."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "style: auto-format $TF_FILE [skip ci]"
            git push
          fi

      - name: Terraform validate
        working-directory: ${{ env.WS_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.WS_DIR }}
        shell: bash
        run: |
          if [[ "$ACTION" == "destroy" ]]; then
            terraform plan -destroy -out=plan.tfplan
          else
            terraform plan -out=plan.tfplan
          fi

      - name: Set artifact name
        id: artifact-name
        shell: bash
        run: |
          # run_id makes the artifact unique to this execution
          # so the apply job always downloads the plan from THIS run
          ARTIFACT="tfplan-${{ github.run_id }}-${TF_FILE%.tf}"
          echo "value=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "Artifact: $ARTIFACT"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.value }}
          path: ${{ env.WS_DIR }}/plan.tfplan
          retention-days: 1

      - name: Write plan summary
        shell: bash
        run: |
          echo "## Plan complete — \`$TF_FILE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **File** | \`$TF_FILE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Action** | \`$ACTION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **State key** | \`${TF_FILE%.tf}.tfstate\` |" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$ACTION" != "plan" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⏳ Waiting for approval before applying." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Apply / Destroy  (skipped when action == plan)
  # ───────────────────────────────────────────────────────────────────────────
  apply:
    name: "${{ github.event.inputs.action }} → ${{ github.event.inputs.tf_file }}"
    runs-on: ubuntu-latest
    needs: plan
    if: github.event.inputs.action != 'plan'
    environment: ${{ github.event.inputs.action }}

    steps:

      # ── MUST be first — fresh runner has no files without this ───────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Debug: confirm files are present after checkout ──────────────────
      - name: Show repository structure
        shell: bash
        run: |
          echo "Working directory: $(pwd)"
          echo ""
          echo "Terraform/ contents:"
          if [[ -d "Terraform" ]]; then
            ls -la Terraform/
          else
            echo "ERROR: Terraform/ directory not found!"
            echo "All .tf files in repo:"
            find . -name "*.tf" | sort
            exit 1
          fi

      - name: Build isolated workspace
        shell: bash
        run: |
          mkdir -p "$WS_DIR"

          # Guard: fail clearly if the file doesn't exist
          if [[ ! -f "Terraform/$TF_FILE" ]]; then
            echo "ERROR: Terraform/$TF_FILE not found after checkout."
            echo "Repo Terraform/ contents:"
            ls -la Terraform/ || echo "(directory missing)"
            exit 1
          fi

          echo "Copying: Terraform/$TF_FILE → $WS_DIR/"
          cp "Terraform/$TF_FILE" "$WS_DIR/"

          for shared in provider.tf versions.tf variables.tf; do
            if [[ -f "Terraform/$shared" ]] && [[ "$shared" != "$TF_FILE" ]]; then
              echo "Copying shared: $shared"
              cp "Terraform/$shared" "$WS_DIR/"
            fi
          done

          for tfvars in Terraform/*.tfvars Terraform/*.tfvars.json; do
            if [[ -f "$tfvars" ]]; then
              echo "Copying tfvars: $(basename $tfvars)"
              cp "$tfvars" "$WS_DIR/"
            fi
          done

          echo ""
          echo "Workspace contents:"
          ls -lh "$WS_DIR/"

      - name: Install Azure CLI
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.9.7"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Terraform init
        working-directory: ${{ env.WS_DIR }}
        shell: bash
        run: |
          STATE_KEY="${TF_FILE%.tf}.tfstate"
          echo "State key: $STATE_KEY"
          terraform init -reconfigure \
            -backend-config="resource_group_name=$BACKEND_RG" \
            -backend-config="storage_account_name=$BACKEND_SA" \
            -backend-config="container_name=$BACKEND_CONTAINER" \
            -backend-config="key=$STATE_KEY"

      - name: Force-unlock stale state lock
        shell: bash
        run: |
          STATE_KEY="${TF_FILE%.tf}.tfstate"
          ACCOUNT_KEY=$(az storage account keys list \
            --resource-group "$BACKEND_RG" --account-name "$BACKEND_SA" \
            --query '[0].value' --output tsv)
          LEASE_STATUS=$(az storage blob show \
            --container-name "$BACKEND_CONTAINER" --name "$STATE_KEY" \
            --account-name "$BACKEND_SA" --account-key "$ACCOUNT_KEY" \
            --query "properties.lease.status" --output tsv 2>/dev/null || echo "notfound")
          echo "Lease status: $LEASE_STATUS"
          if [[ "$LEASE_STATUS" == "locked" ]]; then
            az storage blob lease break \
              --container-name "$BACKEND_CONTAINER" --blob-name "$STATE_KEY" \
              --account-name "$BACKEND_SA" --account-key "$ACCOUNT_KEY"
            echo "OK: Stale lease broken."
          else
            echo "OK: No stale lock."
          fi

      # ── Download the plan produced by job 1 ─────────────────────────────
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.plan.outputs.artifact-name }}
          path: ${{ env.WS_DIR }}

      - name: Confirm plan file present
        shell: bash
        run: |
          if [[ ! -f "$WS_DIR/plan.tfplan" ]]; then
            echo "ERROR: plan.tfplan not found in $WS_DIR after download."
            ls -la "$WS_DIR/"
            exit 1
          fi
          echo "OK: plan.tfplan ready."
          ls -lh "$WS_DIR/"

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.WS_DIR }}
        run: terraform apply -auto-approve plan.tfplan

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.WS_DIR }}
        run: terraform apply -auto-approve plan.tfplan

      - name: Write apply summary
        if: always()
        shell: bash
        run: |
          echo "## Terraform $ACTION complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **File** | \`$TF_FILE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Action** | \`$ACTION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **State key** | \`${TF_FILE%.tf}.tfstate\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
